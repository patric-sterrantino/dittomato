<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{color-scheme:light dark}
html,body{height:100%}
body{
  margin:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;
  background:#f5f5f4;
  color:#1a1a1a;
}
@media (prefers-color-scheme:dark){
  body{background:#17171a;color:#eee}
  .card{background:#202024;border-color:#333}
  a.btn{background:#f13b3b}
}
.card{
  max-width:420px;
  text-align:center;
  padding:40px 32px;
  border:1px solid #e2e2e0;
  border-radius:16px;
  background:#fff;
}
.emoji{font-size:40px;line-height:1;margin-bottom:14px}
h1{font-size:18px;margin:0 0 8px}
p{font-size:14px;line-height:1.5;color:#767671;margin:0 0 22px}
@media (prefers-color-scheme:dark){p{color:#9a9a96}}
a.btn{
  display:inline-block;
  background:#f13b3b;
  color:#fff;
  text-decoration:none;
  font-weight:600;
  font-size:14px;
  padding:10px 22px;
  border-radius:10px;
}
a.btn:hover{opacity:.9}
</style>
</head>
<body>
<div class="card">
  <div class="emoji">🍅</div>
  <h1>dittomato has moved</h1>
  <p>This tool has been replaced. You're being redirected to the new internal tool&hellip;</p>

<script>
setTimeout(function(){ window.location.replace("https://vialytics.github.io/dittomato/"); }, 3000);
</script>

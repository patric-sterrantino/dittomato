              '<span style="font-size:10px;color:var(--txt3);flex:1">Copied this layer?</span>' +
              '<button class="btn btn-ghost btn-sm" style="font-size:10.5px" onclick="detachMatched(' + i + ',\'new\')">Create new</button>' +
              '<button class="btn btn-ghost btn-sm" style="font-size:10.5px" onclick="detachMatched(' + i + ',\'pick\')">Link to existing</button>' +
            '</div>'
          : '') +
        missingVariantHtml(m.comp.id) +
        pluralBtn(m.comp.id) +
        itemBadges(m) +
      '</div>');

    // Text synced, layer name already correct
    if (m.alreadyApplied) return (
      '<div class="item item-matched" style="opacity:0.65">' +
        '<div class="item-top">' +
          '<span style="display:flex;align-items:flex-start;gap:7px;flex:1">' +
            '<i class="ph ph-check-circle" style="color:#10b981;font-size:15px;flex-shrink:0;margin-top:1px"></i>' +
            '<span class="item-text">' + highlightText(m.text) + '</span>' +
          '</span>' +
          '<span class="item-layers">' + layerLabel(m.nodeIds.length) + '</span>' +
        '</div>' +
        '<div class="item-id" style="color:#10b981"><i class="ph ph-check" style="vertical-align:-1px"></i> ' + esc(m.comp.id) + '</div>' +
        missingVariantHtml(m.comp.id) +
        pluralBtn(m.comp.id) +
        itemBadges(m) +
      '</div>');

    // Text synced, layer name needs renaming
    var idPart;
    if (m.candidates.length > 1) {
      var opts = m.candidates.map(function(c, ci) {
        return '<option value="' + ci + '"' + (c.id === m.comp.id ? ' selected' : '') + '>' + esc(c.id) + '</option>';
      }).join('');
      idPart = '<div class="item-id">→ <select class="id-select" onchange="selectMatchedComp(' + i + ',this.selectedIndex)">' + opts + '</select></div>';
    } else {
      idPart = '<div class="item-id">→ ' + esc(m.comp.id) + '</div>';
    }
    return (
      '<div class="item item-matched">' +
        '<div class="item-top">' +
          '<label style="display:flex;align-items:flex-start;gap:7px;cursor:pointer;flex:1">' +
            '<input type="checkbox" id="mc' + i + '" checked style="margin-top:2px;flex-shrink:0">' +
            '<span class="item-text">' + highlightText(m.text) + '</span>' +
          '</label>' +
          '<span class="item-layers">' + layerLabel(m.nodeIds.length) + '</span>' +
        '</div>' +
        idPart +
        missingVariantHtml(m.comp.id) +
        pluralBtn(m.comp.id) +
        itemBadges(m) +
      '</div>');
  }).join('');

  // Near
  document.getElementById('secNear').style.display = near.length ? '' : 'none';
  document.getElementById('nearBadge').textContent = near.length;
  document.getElementById('nearBody').innerHTML = near.map((n, i) => renderNear(n, i)).join('');

  // New
  document.getElementById('secNew').style.display = newItems.length ? '' : 'none';
  document.getElementById('newBadge').textContent = newItems.length;
  document.getElementById('newBody').innerHTML = newItems.map((item, i) =>
    item.showTrans ? renderTransFields('new', i, item) :
    item._applying ? (
    '<div class="item item-new" id="ni-' + i + '">' +
      '<div class="item-top">' +
        '<span class="item-text">' + highlightText(item.text) + '</span>' +
        '<span class="item-layers">' + layerLabel(item.nodeIds.length) + '</span>' +
      '</div>' +
      '<div class="item-actions" style="justify-content:flex-end">' +
        '<button class="btn btn-primary btn-sm" disabled style="opacity:.45">Linking…</button>' +
      '</div>' +
    '</div>') :
    item.picking ? (
    '<div class="item item-new" id="ni-' + i + '">' +
      '<div class="item-top">' +
        '<span class="item-text">' + highlightText(item.text) + '</span>' +
        '<span class="item-layers">' + layerLabel(item.nodeIds.length) + '</span>' +
      '</div>' +
      '<div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--txt3)">Link to existing component</div>' +
      '<input class="pick-search" id="pick-q-' + i + '" placeholder="Search by ID or text…" value="' + esc(item.pickQuery || '') + '" ' +
        'oninput="filterPick(' + i + ',this.value)" onkeydown="if(event.key===\'Escape\')cancelPick(' + i + ')" />' +
      '<div class="pick-list" id="pick-list-' + i + '">' + renderPickList(i) + '</div>' +
      '<div class="item-actions" style="justify-content:flex-end">' +
        '<button class="btn btn-ghost btn-sm" onclick="cancelPick(' + i + ')">Cancel</button>' +
      '</div>' +
    '</div>') : (
    '<div class="item item-new" id="ni-' + i + '">' +
      '<div class="item-top">' +
        '<span class="item-text">' + highlightText(item.text) + '</span>' +
        '<span class="item-layers">' + layerLabel(item.nodeIds.length) + '</span>' +
      '</div>' +
      (item.fromAnnotation ? '<div style="margin:2px 0">' + annotationBadge(item) + '</div>' : '') +
      '<div class="id-prefix-wrap" id="nid-' + i + '" contenteditable="true" spellcheck="false" ' +
        'oninput="suffixInput(' + i + ',this)" ' +
        'onkeydown="if(event.key===\'Enter\')event.preventDefault()" ' +
        'onpaste="event.preventDefault();document.execCommand(\'insertText\',false,(event.clipboardData||window.clipboardData).getData(\'text/plain\'))">' +
        (_newPrefix ? '<span contenteditable="false" style="color:var(--txt3)">' + esc(_newPrefix) + '</span>' : '') +
        esc(item.id) +
      '</div>' +
      '<div class="item-actions" style="justify-content:flex-end">' +
        (item._pushing
          ? '<button class="btn btn-primary btn-sm" disabled style="opacity:.45">Pushing…</button>'
          : '<button class="btn btn-primary btn-sm" id="npushbtn-' + i + '" onclick="openTransFields(\'new\',' + i + ')">Push</button>') +
        '<button class="btn btn-sm" id="nlinkbtn-' + i + '" style="display:none;background:var(--green);color:#fff;border-color:var(--green)" onclick="linkToExisting(' + i + ')">Link</button>' +
        '<button class="btn btn-ghost btn-sm" onclick="startPickExisting(' + i + ')">Select existing</button>' +
        '<button class="btn btn-ghost btn-sm" style="color:var(--txt3)" onclick="ignoreNew(' + i + ', this)" title="Rename layer with // prefix to exclude from future scans">// Ignore</button>' +
      '</div>' +
      '<span class="item-status" id="ns-' + i + '"></span>' +
    '</div>')).join('');
  // Re-check each new item in case a typed ID already matches an existing comp
  st.newItems.forEach(function(_, i) { checkNewIdMatch(i); });

  // Ignored
  var ignored = st.ignored;
  document.getElementById('secIgnored').style.display = ignored.length ? '' : 'none';
  document.getElementById('ignoredBadge').textContent = ignored.length;
  document.getElementById('ignoredBody').innerHTML = ignored.map(function(item, i) {
    return (
      '<div class="item" style="opacity:0.55">' +
        '<div class="item-top">' +
          '<span style="font-family:var(--mono);font-size:11px;color:var(--txt3)">' + esc(item.layerName) + '</span>' +
          '<button class="btn btn-ghost btn-sm" onclick="unignore(' + i + ', this)" style="opacity:1;flex-shrink:0">Unignore</button>' +
        '</div>' +
        (item.text ? '<div class="item-text" style="font-size:11px;margin-top:3px;color:var(--txt3)">' + highlightText(trunc(item.text, 80)) + '</div>' : '') +
      '</div>'
    );
  }).join('');

  // Done banner
  const allGone = matched.length === 0 && near.length === 0 && newItems.length === 0;
  document.getElementById('doneBanner').style.display = allGone ? '' : 'none';

  // Translate bar — show whenever there are matched items (Base + Show IDs always available)
  var bar = document.getElementById('translateBar');
  if (bar) {
    bar.style.display = matched.length > 0 ? '' : 'none';
    if (matched.length > 0) populateVariantDropdown();
  }

  // Mount whitespace overlay on any translation textareas rendered this cycle
  document.querySelectorAll('textarea.id-input').forEach(mountWs);

  show('sResults');
}

function renderNear(n, i) {
  if (n.decision === 'use') return `
    <div class="item item-resolved">
      <div class="item-top">
        <span class="item-text">${highlightText(n.text)}</span>
        <span class="item-layers">${layerLabel(n.nodeIds.length)}</span>
      </div>
      <div class="item-id">→ ${esc(n.comp.id)}</div>
      <div class="item-actions">
        <button class="btn btn-green btn-sm" onclick="renameNear(${i})">Rename layers</button>
        <button class="btn btn-ghost btn-sm" onclick="undoNear(${i})">Undo</button>
        <span class="item-status" id="nrs-${i}"></span>
      </div>
    </div>`;

  if (n.decision === 'new') {
    if (n.showTrans) return renderTransFields('near', i, n);
    const sid = n.nearId || suggestId(n.text);
    return `
    <div class="item item-new" id="ni-near-new-${i}">
      <div class="item-top">
        <span class="item-text">${highlightText(n.text)}</span>
        <span class="item-layers">${layerLabel(n.nodeIds.length)}</span>
      </div>
      <div class="item-similar">Skipping <strong>${esc(n.comp.id)}</strong> — creating new</div>
      <div style="display:flex;align-items:center;gap:8px">
        <div class="id-row" style="flex:1;min-width:0">
          <span class="id-label">ID</span>
          <input class="id-input" id="nrid-${i}" value="${esc(sid)}" oninput="var v=sanitizeId(this.value);this.value=v;st.near[${i}].nearId=v" style="min-width:0" />
        </div>
        <button class="btn btn-primary btn-sm" style="flex-shrink:0" onclick="openTransFields('near',${i})">Push</button>
        <button class="btn btn-ghost btn-sm" style="flex-shrink:0;color:var(--txt3);font-family:var(--mono);letter-spacing:0" onclick="ignoreNear(${i}, this)" title="Rename layer with // prefix to exclude from future scans">// Ignore</button>
        <button class="btn btn-ghost btn-sm" style="flex-shrink:0" onclick="undoNear(${i})">Undo</button>
      </div>
      <span class="item-status" id="nns-${i}"></span>
    </div>`;
  }

  // Undecided — picker open
  if (n.picking) return `
    <div class="item item-near" id="ni-near-${i}">
      <div class="item-top">
        <span class="item-text">${highlightText(n.text)}</span>
        <span class="item-layers">${layerLabel(n.nodeIds.length)}</span>
      </div>
      <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--txt3)">Link to existing component</div>
      <input class="pick-search" id="near-pick-q-${i}" placeholder="Search by ID or text…" value="${esc(n.pickQuery || '')}"
        oninput="filterNearPick(${i},this.value)" onkeydown="if(event.key==='Escape')cancelNearPick(${i})" />
      <div class="pick-list" id="near-pick-list-${i}">${renderNearPickList(i)}</div>
      <div class="item-actions" style="justify-content:flex-end">
        <button class="btn btn-ghost btn-sm" onclick="cancelNearPick(${i})">Cancel</button>
      </div>
    </div>`;

  // Undecided — normal
  return `
    <div class="item item-near" id="ni-near-${i}">
      <div class="item-top">
        <span class="item-text">${highlightText(n.text)}</span>
        <span class="item-layers">${layerLabel(n.nodeIds.length)}</span>
      </div>
      <div style="display:flex;gap:10px;margin-top:2px">
        <div style="flex:1">
          <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--txt3);margin-bottom:3px">Figma</div>
          <div class="item-similar">${highlightText(n.text)}</div>
        </div>
        ${n.comp.text ? `<div style="flex:1">
          <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--amber);margin-bottom:3px">Ditto · ${esc(n.comp.id)}</div>
          <div class="item-similar">${highlightText(n.comp.text)}</div>
        </div>` : `<div style="font-size:10.5px;color:var(--txt3);align-self:center">→ <strong style="color:var(--amber)">${esc(n.comp.id)}</strong></div>`}
      </div>
      <div class="item-actions" style="justify-content:flex-end">
        <button class="btn btn-ghost btn-sm" style="color:var(--txt3);font-family:var(--mono);letter-spacing:0" onclick="ignoreNear(${i}, this)" title="Rename layer with // prefix to exclude from future scans">// Ignore</button>
        <button class="btn btn-ghost btn-sm" ${n._applying || n._pushing ? 'disabled style="opacity:.45"' : `onclick="startNearPickExisting(${i})"`}>Link to existing</button>
        <button class="btn btn-ghost btn-sm" ${n._applying || n._pushing ? 'disabled style="opacity:.45"' : `onclick="setNearDecision(${i},'new')"`}>Create new</button>
        <button class="btn btn-ghost btn-sm" ${n._applying || n._pushing ? 'disabled style="opacity:.45"' : `onclick="updateNearComp(${i})"`}>${n._pushing ? 'Updating…' : 'Push Figma → Ditto'}</button>
        <button class="btn btn-primary btn-sm" ${n._applying || n._pushing ? 'disabled style="opacity:.45"' : `onclick="useNearDittoText(${i})"`}>${n._applying ? 'Applying…' : 'Use Ditto text'}</button>
        <span class="item-status" id="nupd-${i}"></span>
      </div>
    </div>`;
}

// ── Section collapse ───────────────────────────────────────────────────────
function toggleSec(name) {
  const bodyId = name === 'matched' ? 'matchedBody' : name === 'near' ? 'nearBody' : name === 'ignored' ? 'ignoredBody' : 'newBody';
  const chevId = name === 'matched' ? 'chevMatched' : name === 'near' ? 'chevNear' : name === 'ignored' ? 'chevIgnored' : 'chevNew';
  const body = document.getElementById(bodyId);
  const chev = document.getElementById(chevId);
  const isCollapsed = body.classList.toggle('collapsed');
  if (chev) chev.style.transform = isCollapsed ? '' : 'rotate(90deg)';
}

// ── Actions: matched ───────────────────────────────────────────────────────
function renameAllMatched() {
  const renames = [];
  st.matched.forEach((m, i) => {
    const cb = document.getElementById(`mc${i}`);
    if (cb && cb.checked) {
      m.nodeIds.forEach(nid => renames.push({ nodeId: nid, newName: m.comp.id }));
    }
  });
  if (!renames.length) return;
  _silentRescan = true;
  parent.postMessage({ pluginMessage: { type: 'rename-and-rescan', renames } }, '*');
}

function selectMatchedComp(i, idx) {
  st.matched[i].comp = st.matched[i].candidates[idx];
}

function updateNewPrefix(val) {
  _newPrefix = val;
  renderResults(); // newPrefixInp is static HTML, not affected by re-render
}

// ── Translation fields ─────────────────────────────────────────────────────
function renderTransFields(type, i, item) {
  const devId  = item.fullId || (type === 'new' ? _newPrefix + (item.id || suggestId(item.text)) : null) || item.nearId || item.id || suggestId(item.text);
  const fields = (_variants || []).map(v => `
    <div class="id-row" style="align-items:flex-start">
      <span class="id-label" style="min-width:60px;padding-top:7px">${esc(v.name || v.id)}</span>
      <textarea class="id-input" id="tr_${type}_${i}_${esc(v.id)}" placeholder="optional"
             rows="1" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
    </div>`).join('');
  return `
    <div class="item item-new" id="ni-trans-${type}-${i}">
      <div class="item-top">
        <span class="item-text">${highlightText(item.text)}</span>
        <span class="item-layers">${layerLabel(item.nodeIds.length)}</span>
      </div>
      <div class="item-id" style="margin-bottom:4px">→ ${esc(devId)}</div>
      ${fields.length ? `
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--txt3);margin-top:2px">
        Translations <span style="font-weight:400;text-transform:none;letter-spacing:0">(optional)</span>
      </div>
      ${fields}` : ''}
      <div class="item-actions" style="margin-top:6px;justify-content:flex-end">
        <button class="btn btn-ghost btn-sm" ${item._pushing ? 'disabled style="opacity:.45"' : `onclick="cancelTrans('${type}',${i})"`}>Back</button>
        <button class="btn btn-primary btn-sm" ${item._pushing ? 'disabled style="opacity:.45"' : `onclick="confirmPush('${type}',${i},'${esc(devId)}')"`}>${item._pushing ? 'Pushing…' : 'Push to Ditto'}</button>
        <span class="item-status" id="ts-${type}-${i}"></span>
      </div>
    </div>`;
}

async function openTransFields(type, i) {
  // Sync the current ID input value into state before switching view
  if (type === 'new') {
    // st.newItems[i].id is kept in sync by suffixInput on every keystroke
    st.newItems[i].id = sanitizeIdFinal(st.newItems[i].id || '');
    st.newItems[i].fullId = sanitizeIdFinal(_newPrefix + st.newItems[i].id);
    await ensureVariants();
    if (!_variants.length) { await confirmPush('new', i, st.newItems[i].fullId); return; }
    st.newItems[i].showTrans = true;
  } else {
    const inp = document.getElementById(`nrid-${i}`);
    if (inp) st.near[i].nearId = sanitizeIdFinal(inp.value) || st.near[i].nearId || suggestId(st.near[i].text);
    await ensureVariants();
    if (!_variants.length) { await confirmPush('near', i, sanitizeIdFinal(st.near[i].nearId) || suggestId(st.near[i].text)); return; }
    st.near[i].showTrans = true;
  }
  renderResults();
}

function cancelTrans(type, i) {
  if (type === 'new') st.newItems[i].showTrans = false;
  else { st.near[i].showTrans = false; }
  renderResults();
}

async function confirmPush(type, i, developerId) {
  const item = type === 'new' ? st.newItems[i] : st.near[i];
  // Collect translation values before re-render (inputs will be gone after renderResults)
  const variantTexts = {};
  for (const v of (_variants || [])) {
    const el = document.getElementById('tr_' + type + '_' + i + '_' + v.id);
    const val = el ? el.value.trim() : '';
    if (val) variantTexts[v.id] = val;
  }
  item._pushing = true;
  renderResults(); // lock buttons immediately
  const s = document.getElementById(`ts-${type}-${i}`);
  if (s) { s.textContent = 'Pushing…'; s.className = 'item-status'; }
  try {
    const k = getDittoKey();
    await postComp(k, item.text, item.text, developerId, variantTexts);
    const s2 = document.getElementById(`ts-${type}-${i}`);
    if (s2) { s2.innerHTML = '<i class="ph ph-check-circle"></i>'; s2.className = 'item-status ok'; }
    _justPushed.add(developerId); // enables the Plurals button on this component post-push
    const renames = item.nodeIds.map(nid => ({ nodeId: nid, newName: developerId }));
    setTimeout(() => {
      if (type === 'new') st.newItems.splice(i, 1);
      else st.near.splice(i, 1);
      renderResults();
      _silentRescan = true;
      parent.postMessage({ pluginMessage: { type: 'rename-and-rescan', renames } }, '*');
    }, 900);
  } catch(e) {
    item._pushing = false;
    renderResults(); // restore buttons
    const s2 = document.getElementById(`ts-${type}-${i}`);
    if (s2) { s2.innerHTML = '<i class="ph ph-x-circle"></i> ' + esc(e.message); s2.className = 'item-status err'; }
  }
}

// ── Actions: near ──────────────────────────────────────────────────────────
function setNearDecision(i, d) {
  st.near[i].decision = d;
  const el = document.getElementById(`ni-near-${i}`);
  if (el) el.outerHTML = renderNear(st.near[i], i);
}
function undoNear(i) {
  st.near[i].decision = null;
  renderResults();
}
function renameNear(i) {
  const n = st.near[i];
  const renames = n.nodeIds.map(nid => ({ nodeId: nid, newName: n.comp.id }));
  _silentRescan = true;
  parent.postMessage({ pluginMessage: { type: 'rename-and-rescan', renames } }, '*');
}
// ── Actions: matched — detach (copied layer with new text) ────────────────
// Moves a drifted matched item to the "New" section so the user can assign a
// fresh ID or link to a different existing component.  Renames the Figma layer
// away from the old comp ID so the next scan doesn't re-match it.
function detachMatched(i, mode) {
  const m = st.matched[i];
  const newItem = {
    text: m.text,
    nodeIds: m.nodeIds,
    layerNames: m.layerNames,
    id: suggestId(m.text),
    picking: mode === 'pick',
    pickQuery: mode === 'pick' ? m.text : '',
  };
  st.matched.splice(i, 1);
  st.newItems.unshift(newItem);
  renderResults();
  // Auto-expand the New section so the user sees the item immediately
  var nb = document.getElementById('newBody');
  var cn = document.getElementById('chevNew');
  if (nb) nb.classList.remove('collapsed');
  if (cn) cn.style.transform = 'rotate(90deg)';
  // Rename layers to their text content so the next scan won't re-match by layer name
  var renames = m.nodeIds.map(function(nid) { return { nodeId: nid, newName: m.text }; });
  _silentRescan = true;
  parent.postMessage({ pluginMessage: { type: 'rename-and-rescan', renames: renames } }, '*');
}

// ── Actions: matched text sync ─────────────────────────────────────────────
function applyDittoToFigma(i) {
  const m = st.matched[i];
  if (!m.comp.text) return;
  m._applying = true;
  renderResults();
  const s = document.getElementById(`ms-${i}`);
  if (s) { s.textContent = 'Applying…'; s.className = 'item-status'; }
  const textMap = {};
  m.nodeIds.forEach(nid => { textMap[nid] = m.comp.text; });
  _silentRescan = true;
  parent.postMessage({ pluginMessage: { type: 'text-rename-rescan', textMap, renames: [] } }, '*');
}

async function pushMatchedToDitto(i) {
  const m = st.matched[i];
  m._pushing = true;
  renderResults();
  const s = document.getElementById(`ms-${i}`);
  if (s) { s.textContent = 'Updating…'; s.className = 'item-status'; }
  try {
    const k = getDittoKey();
    const res = await fetch(API + '/components', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', Authorization: k },
      body: JSON.stringify({ updates: [{ developerId: m.comp.id, text: m.text }] }),
    });
    if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.message || `HTTP ${res.status}`); }
    m._pushing = false;
    const s2 = document.getElementById(`ms-${i}`);
    if (s2) { s2.innerHTML = '<i class="ph ph-check-circle"></i>'; s2.className = 'item-status ok'; }
    _silentRescan = true;
    parent.postMessage({ pluginMessage: { type: 'rescan' } }, '*');
  } catch(e) {
    m._pushing = false;
    renderResults();
    const s2 = document.getElementById(`ms-${i}`);
    if (s2) { s2.innerHTML = '<i class="ph ph-x-circle"></i> ' + esc(e.message); s2.className = 'item-status err'; }
  }
}

function useNearDittoText(i) {
  const n = st.near[i];
  n._applying = true;
  const el = document.getElementById(`ni-near-${i}`);
  if (el) el.outerHTML = renderNear(n, i);
  const s = document.getElementById(`nupd-${i}`);
  if (s) { s.textContent = 'Applying…'; s.className = 'item-status'; }
  const textMap = {};
  if (n.comp.text) n.nodeIds.forEach(nid => { textMap[nid] = n.comp.text; });
  const renames = n.nodeIds.map(nid => ({ nodeId: nid, newName: n.comp.id }));
  _silentRescan = true;
  parent.postMessage({ pluginMessage: { type: 'text-rename-rescan', textMap, renames } }, '*');
}

async function updateNearComp(i) {
  const n = st.near[i];
  const s = document.getElementById(`nupd-${i}`);
  if (s) { s.textContent = 'Updating…'; s.className = 'item-status'; }
  try {
    const k = getDittoKey();
    const res = await fetch(API + '/components', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', Authorization: k },
      body: JSON.stringify({ updates: [{ developerId: n.comp.id, text: n.text }] }),
    });
    if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.message || `HTTP ${res.status}`); }
    if (s) { s.innerHTML = '<i class="ph ph-check-circle"></i>'; s.className = 'item-status ok'; }
    const renames = n.nodeIds.map(nid => ({ nodeId: nid, newName: n.comp.id }));
    _silentRescan = true;
    parent.postMessage({ pluginMessage: { type: 'rename-and-rescan', renames } }, '*');
  } catch(e) {
    if (s) { s.innerHTML = '<i class="ph ph-x-circle"></i> ' + esc(e.message); s.className = 'item-status err'; }
  }
}
// pushNearAsNew now goes through openTransFields (defined above)

async function pushAllNew() {
  // Collect all before any splice
  const targets = st.newItems.map((item, i) => {
    const suffix = st.newItems[i].id;
    const id = suffix ? sanitizeIdFinal(_newPrefix + suffix) : null;
    return { item, i, id };
  }).filter(t => t.id);

  // Lock all targeted items immediately
  targets.forEach(t => { t.item._pushing = true; });
  renderResults();

  const k = getDittoKey();
  const allRenames = [];
  await Promise.all(targets.map(async ({ item, i, id }) => {
    const s = document.getElementById(`ns-${i}`);
    if (s) s.textContent = 'Pushing…';
    try {
      await postComp(k, item.text, item.text, id);
      if (s) { s.innerHTML = '<i class="ph ph-check-circle"></i>'; s.className = 'item-status ok'; }
      _justPushed.add(id);
      item.nodeIds.forEach(nid => allRenames.push({ nodeId: nid, newName: id }));
      item._done = true;
    } catch(e) {
      if (s) { s.innerHTML = '<i class="ph ph-x-circle"></i> ' + esc(e.message); s.className = 'item-status err'; }
    }
  }));
  setTimeout(() => {
    st.newItems = st.newItems.filter(it => !it._done);
    renderResults();
    if (allRenames.length) {
      _silentRescan = true;
      parent.postMessage({ pluginMessage: { type: 'rename-and-rescan', renames: allRenames } }, '*');
    }
  }, 1000);
}

// ── Translate canvas ───────────────────────────────────────────────────────
function populateVariantDropdown() {
  const sel = document.getElementById('translateVariantSel');
  if (!sel) return;
  const current = sel.value;
  sel.innerHTML =
    '<option value="__base__"' + (current === '__base__' ? ' selected' : '') + '>Base</option>' +
    ((_variants || []).map(function(v) {
      return '<option value="' + esc(v.id) + '"' + (v.id === current ? ' selected' : '') + '>' + esc(v.name || v.id) + '</option>';
    }).join('')) +
    '<option value="__ids__"' + (current === '__ids__' ? ' selected' : '') + '>Show IDs</option>';
}

async function applyTranslation() {
  const sel = document.getElementById('translateVariantSel');
  const variantId = sel ? sel.value : '';
  if (!variantId) return;
  const status = document.getElementById('translateStatus');
  status.style.display = '';

  // Special case: write the component ID into each matched Figma text node
  if (variantId === '__ids__') {
    const nodeMap = {};
    for (var mi = 0; mi < st.matched.length; mi++) {
      var item = st.matched[mi];
      var compId = item.comp && (item.comp.developerId || item.comp.id);
      if (!compId) continue;
      for (var ni = 0; ni < item.nodeIds.length; ni++) {
        nodeMap[item.nodeIds[ni]] = compId;
      }
    }
    if (!Object.keys(nodeMap).length) {
      status.textContent = 'No matched items to label.';
      return;
    }
    status.textContent = 'Writing IDs…';
    parent.postMessage({ pluginMessage: { type: 'apply-variant', nodeMap: nodeMap } }, '*');
    return;
  }

  status.textContent = 'Fetching translations…';
  try {
    const k = getDittoKey();
    const isBase = variantId === '__base__';
    const filter = encodeURIComponent(JSON.stringify({ variants: [{ id: isBase ? 'all' : variantId }] }));
    const res = await fetch(API + '/components?filter=' + filter, {
      headers: { Authorization: k },
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    const rows = Array.isArray(json) ? json : (json.items || json.data || json.components || []);

    // Base: rows with variantId === null. Translation: rows with variantId set.
    const transMap = {};
    for (var ri = 0; ri < rows.length; ri++) {
      var c = rows[ri];
      if (isBase ? c.variantId !== null : !c.variantId) continue;
      var id = c.developerId || c.id;
      if (id && c.text) transMap[id] = c.text;
    }
    if (!Object.keys(transMap).length) {
      status.textContent = 'No translations found for this variant.';
      return;
    }

    // Build { nodeId → translatedText } using already-scanned matched items.
    const nodeMap = {};
    for (var mi = 0; mi < st.matched.length; mi++) {
      var item = st.matched[mi];
      var compId = item.comp && (item.comp.developerId || item.comp.id);
      var translatedText = compId && transMap[compId];
      if (!translatedText) continue;
      for (var ni = 0; ni < item.nodeIds.length; ni++) {
        nodeMap[item.nodeIds[ni]] = translatedText;
      }
    }

    if (!Object.keys(nodeMap).length) {
      status.textContent = 'No matched IDs found for this variant.';
      return;
    }

    status.textContent = 'Applying…';
    parent.postMessage({ pluginMessage: { type: 'apply-variant', nodeMap: nodeMap } }, '*');
  } catch(e) {
    status.textContent = '❌ ' + e.message;
  }
}

function applyDebugTranslation() {
  const status = document.getElementById('translateStatus');
  // Build a fake transMap: every matched component ID → "🧪 <id>"
  const transMap = {};
  for (var i = 0; i < st.matched.length; i++) {
    var item = st.matched[i];
    var compId = item.comp && (item.comp.developerId || item.comp.id);
    if (!compId) continue;
    // Also map every layer name for this item in case it differs from compId
    for (var j = 0; j < item.layerNames.length; j++) {
      transMap[item.layerNames[j]] = '🧪 ' + item.layerNames[j];
    }
    transMap[compId] = '🧪 ' + compId;
  }
  var count = Object.keys(transMap).length;
  if (!count) {
    if (status) status.textContent = 'No matched IDs to test with — run a scan first.';
    return;
  }
  if (status) status.textContent = 'Sending ' + count + ' test entries…';
  parent.postMessage({ pluginMessage: { type: 'apply-variant', transMap: transMap } }, '*');
}

// ── Message from plugin code ───────────────────────────────────────────────
window.onmessage = async (event) => {
  const msg = event.data.pluginMessage;
  if (!msg) return;

  if (msg.type === 'rename-done') return;

  if (msg.type === 'translate-done') {
    const btn    = document.getElementById('translateBtn');
    const status = document.getElementById('translateStatus');
    if (btn) btn.disabled = false;
    var statusMsg = msg.count
      ? '✅ Updated ' + msg.count + ' layer' + (msg.count !== 1 ? 's' : '')
      : 'No layers updated.';
    if (msg.errors && msg.errors.length) {
      statusMsg += ' ⚠️ ' + msg.errors.length + ' error(s): ' + msg.errors.slice(0, 2).join('; ');
    }
    if (status) { status.textContent = statusMsg; status.style.display = ''; }
    return;
  }

  // Key is loaded from figma.clientStorage — this is the real init trigger
  if (msg.type === 'key-loaded') {
    _key = msg.value || '';
    document.getElementById('scanBtn').disabled = !_key;
    if (!_key) { showSetup(); return; }
    // key-loaded fires before scan-result, so just show loading
    setLoading('Scanning…');
    return;
  }

  // Never let incoming messages override the setup screen
  if (!getDittoKey()) { showSetup(); return; }

  if (msg.type === 'no-selection') { show('sNone'); return; }

  if (msg.type === 'scan-result') {
    if (!msg.nodes.length) { show('sNoText'); return; }

    const silent = _silentRescan;
    _silentRescan = false;
    if (!silent) setLoading('Fetching Ditto components…');

    try {
      const allRows = await fetchComps(getDittoKey());
      // _allComps = unique real components (no variant rows, no plural-form rows)
      const _seenIds = new Set();
      _allComps = allRows.filter(c => !c.variantId && !isPluralRow(c) && c.id && !_seenIds.has(c.id) && _seenIds.add(c.id));
      await ensureVariants();
      // Build plural-aware variant coverage via the all-variants fetch — the default
      // /components endpoint only returns base rows, so allRows alone can't tell us
      // which variants have translations.
      _compVariantCoverage = { requiredForms: new Map(), got: new Map() };
      var variantRows = []; // rows with a variantId + text — used for variant-text matching
      if (_variants && _variants.length) {
        try {
          const _covFilter = encodeURIComponent(JSON.stringify({ variants: [{ id: 'all' }] }));
          const _covRes = await fetch(API + '/components?filter=' + _covFilter, { headers: { Authorization: getDittoKey() } });
          if (_covRes.ok) {
            const _covJson = await _covRes.json();
            const _covRows = Array.isArray(_covJson) ? _covJson : (_covJson.items || _covJson.data || _covJson.components || []);
            _compVariantCoverage = buildCoverage(_covRows);
            for (var _ci = 0; _ci < _covRows.length; _ci++) {
              var _cc = _covRows[_ci];
              if (_cc.variantId && _cc.text) variantRows.push(_cc);
            }
          }
        } catch(e) { /* non-critical — missing-variant warnings won't show */ }
      }
      // Snapshot user-edited state (typed IDs, open forms, near decisions, in-flight
      // push/apply flags) so a post-push silent rescan doesn't wipe edits or unlock
      // buttons while an async operation is still in progress.
      const _editSnap = {};
      st.newItems.forEach(function(item) {
        _editSnap['new|' + item.text] = { id: item.id, showTrans: item.showTrans, picking: item.picking, pickQuery: item.pickQuery };
      });
      st.near.forEach(function(item) {
        var key = item.comp && item.comp.id;
        if (key) _editSnap['near|' + key] = { nearId: item.nearId, decision: item.decision, showTrans: item.showTrans, _pushing: item._pushing, _applying: item._applying, picking: item.picking, pickQuery: item.pickQuery };
      });
      // Matched items: preserve in-flight push/apply state so intermediate scans
      // (e.g. from selectionchange) don't re-enable buttons mid-operation.
      const _matchedBusy = new Map();
      st.matched.forEach(function(m) {
        if (m._pushing || m._applying) _matchedBusy.set(m.comp.id, { _pushing: m._pushing, _applying: m._applying });
      });

      // Pass base rows + variant rows so translated (non-base) text also matches
      const result = matchNodes(msg.nodes, allRows, variantRows);
      st.matched  = result.matched;
      st.near     = result.near;
      st.newItems = result.newItems;
      st.ignored  = msg.ignored || [];

      // Restore edits onto items that survived the rescan
      st.newItems.forEach(function(item) {
        var saved = _editSnap['new|' + item.text];
        if (saved) {
          if (saved.id) item.id = saved.id;
          if (saved.showTrans) item.showTrans = saved.showTrans;
          if (saved.picking) item.picking = saved.picking;
          if (saved.pickQuery !== undefined) item.pickQuery = saved.pickQuery;
        }
      });
      st.near.forEach(function(item) {
        var key = item.comp && item.comp.id;
        var saved = key && _editSnap['near|' + key];
        if (saved) {
          if (saved.nearId) item.nearId = saved.nearId;
          if (saved.decision) item.decision = saved.decision;
          if (saved.showTrans) item.showTrans = saved.showTrans;
          if (saved._pushing) item._pushing = saved._pushing;
          if (saved._applying) item._applying = saved._applying;
          if (saved.picking) item.picking = saved.picking;
          if (saved.pickQuery !== undefined) item.pickQuery = saved.pickQuery;
        }
      });
      // Restore in-flight busy state on matched items — clears naturally once the
      // operation completes and the item moves out of the drift state.
      st.matched.forEach(function(m) {
        var b = _matchedBusy.get(m.comp.id);
        if (b) { m._pushing = b._pushing; m._applying = b._applying; }
      });
      // Auto-fill prefix from file/frame context on every explicit scan
      if (!silent && msg.suggestedPrefix !== undefined) {
        _newPrefix = msg.suggestedPrefix;
        const pfxInp = document.getElementById('newPrefixInp');
        if (pfxInp) pfxInp.value = msg.suggestedPrefix;
      }
      // On a silent (post-edit) rescan, keep the user's place: expanded sections + scroll.
      var snap = null;
      if (silent) {
        var contentEl = document.querySelector('.content');
        snap = {
          scroll: contentEl ? contentEl.scrollTop : 0,
          matched: !(document.getElementById('matchedBody') || {}).classList?.contains('collapsed'),
          ignored: !(document.getElementById('ignoredBody') || {}).classList?.contains('collapsed'),
        };
      }
      renderResults();
      if (snap) {
        ['matched', 'ignored'].forEach(function(s) {
          if (!snap[s]) return;
          var bodyEl = document.getElementById(s + 'Body');
          var chev = document.getElementById('chev' + s.charAt(0).toUpperCase() + s.slice(1));
          if (bodyEl) bodyEl.classList.remove('collapsed');
          if (chev) chev.style.transform = 'rotate(90deg)';
        });
        var c2 = document.querySelector('.content');
        if (c2) c2.scrollTop = snap.scroll;
      }
    } catch(e) {
      if (!silent) {
        show('sLoading');
        document.getElementById('loadMsg').textContent = '❌ ' + e.message;
        if (e.message.includes('401') || e.message.includes('403')) {
          setTimeout(showSetup, 1200);
        }
      }
    }
  }
};

// ── Init — wait for key-loaded message from code.js ───────────────────────
const _verEl = document.getElementById('pluginVersion');
if (_verEl) _verEl.textContent = 'v' + VERSION;
setLoading('Starting…');
</script>

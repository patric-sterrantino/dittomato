<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
@import url('https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css');

:root {
  color-scheme: dark;
  --bg:         #0a0a0c;
  --surface:    #131316;
  --surface2:   #1b1b20;
  --surface3:   #26262d;
  --line:       rgba(255,255,255,0.09);
  --line2:      rgba(255,255,255,0.16);
  --txt:        #f5f5f7;
  --txt2:       #a8a8b3;
  --txt3:       #7c7c88;
  --blue:       #7ea2ff;
  --blue-dim:   rgba(126,162,255,0.16);
  --green:      #46d98a;
  --green-dim:  rgba(70,217,138,0.15);
  --amber:      #f5b13a;
  --amber-dim:  rgba(245,177,58,0.15);
  --red:        #fb7185;
  --red-dim:    rgba(251,113,133,0.15);
  --primary:        #fafafa;
  --primary-fg:     #18181b;
  --primary-hover:  #e4e4e7;
  --ring:           var(--blue);
  --hover:          rgba(255,255,255,0.055);
  --selection-fg:   #0a0a0c;
  --scrollbar:      rgba(255,255,255,0.14);
  --shadow-sm:  0 1px 2px rgba(0,0,0,0.45);
  --shadow-md:  0 6px 22px rgba(0,0,0,0.5);
  --mono:       'SF Mono','Fira Code',ui-monospace,monospace;
  --r:          6px;
  --r-sm:       4px;
}

[data-theme="light"] {
  color-scheme: light;
  --bg:         #f5f5f7;
  --surface:    #ffffff;
  --surface2:   #f3f3f5;
  --surface3:   #e8e8ec;
  --line:       rgba(9,9,11,0.10);
  --line2:      rgba(9,9,11,0.15);
  --txt:        #18181b;
  --txt2:       #52525b;
  --txt3:       #82828c;
  --blue:       #2563eb;
  --blue-dim:   rgba(37,99,235,0.10);
  --green:      #15803d;
  --green-dim:  rgba(21,128,61,0.10);
  --amber:      #b45309;
  --amber-dim:  rgba(180,83,9,0.11);
  --red:        #dc2626;
  --red-dim:    rgba(220,38,38,0.10);
  --primary:        #18181b;
  --primary-fg:     #fafafa;
  --primary-hover:  #3f3f46;
  --hover:          rgba(9,9,11,0.045);
  --selection-fg:   #ffffff;
  --scrollbar:      rgba(9,9,11,0.18);
  --shadow-sm:  0 1px 2px rgba(9,9,11,0.08);
  --shadow-md:  0 6px 22px rgba(9,9,11,0.12);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 12px;
  background: var(--bg);
  color: var(--txt);
  display: flex; flex-direction: column; overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── Scrollbar ───────────────────────────────────────────────────────────── */
html, body { transition: background-color 200ms ease; }
::-webkit-scrollbar { width: 9px; height: 9px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 999px; border: 2px solid transparent; background-clip: padding-box; }

::selection { background: var(--blue); color: var(--selection-fg); }

/* ── Header ──────────────────────────────────────────────────────────────── */
.hd {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px; height: 50px;
  border-bottom: 1px solid var(--line);
  background: var(--surface); flex-shrink: 0;
}
.hd-title {
  font-weight: 600; font-size: 14px; letter-spacing: -.02em;
  display: flex; align-items: center; gap: 7px; color: var(--txt);
}
.hd-actions { display: flex; align-items: center; gap: 8px; }

/* theme toggle */
.theme-toggle { width: 28px; height: 28px; border-radius: var(--r); border: 1px solid var(--line2);
  background: var(--surface2); color: var(--txt2); display: inline-flex; align-items: center;
  justify-content: center; cursor: pointer; flex-shrink: 0; padding: 0;
  transition: background 150ms, color 150ms, border-color 150ms; }
.theme-toggle:hover { background: var(--surface3); color: var(--txt); }
.theme-toggle .ti-moon { display: none; }
.theme-toggle .ti-sun { display: block; }
[data-theme="light"] .theme-toggle .ti-sun { display: none; }
[data-theme="light"] .theme-toggle .ti-moon { display: block; }

/* ── Buttons ─────────────────────────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 6px 13px; border-radius: var(--r); font-size: 11.5px; font-weight: 500;
  border: 1px solid transparent; cursor: pointer; font-family: inherit;
  white-space: nowrap; transition: background 120ms, box-shadow 120ms, opacity 120ms;
  line-height: 1; letter-spacing: -.01em;
}
.btn:disabled { opacity: .3; cursor: not-allowed; }

.btn-primary {
  background: var(--primary); color: var(--primary-fg); border-color: var(--primary);
  box-shadow: var(--shadow-sm);
}
.btn-primary:not(:disabled):hover {
  background: var(--primary-hover); border-color: var(--primary-hover);
}

.btn-ghost {
  background: var(--surface3); color: var(--txt2);
  border-color: var(--line2);
}
.btn-ghost:not(:disabled):hover { background: var(--surface2); color: var(--txt); border-color: var(--line2); }

.btn-green {
  background: var(--green-dim); color: var(--green);
  border-color: color-mix(in srgb,var(--green) 28%,transparent);
}
.btn-green:not(:disabled):hover { background: color-mix(in srgb,var(--green) 22%,transparent); }

.btn-sm { padding: 6px 13px; font-size: 11px; }

/* ── Content ─────────────────────────────────────────────────────────────── */
.content { flex: 1; overflow-y: auto; min-height: 0; }

/* ── States ──────────────────────────────────────────────────────────────── */
.state { padding: 48px 20px; text-align: center; color: var(--txt2); }
.state p { font-size: 12px; line-height: 1.7; }
.state strong { color: var(--txt); font-weight: 500; }

.spinner {
  width: 16px; height: 16px;
  border: 1.5px solid var(--line2); border-top-color: var(--blue);
  border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Setup ───────────────────────────────────────────────────────────────── */
.setup { padding: 24px; display: flex; flex-direction: column; gap: 20px; }
.setup p { font-size: 12.5px; color: var(--txt2); line-height: 1.75; }
.field { display: flex; flex-direction: column; gap: 6px; }
.field label {
  font-size: 10.5px; font-weight: 600; text-transform: uppercase;
  letter-spacing: .06em; color: var(--txt3);
}
.field input {
  border: 1px solid var(--line2); border-radius: var(--r);
  padding: 9px 12px; font-size: 12.5px; font-family: inherit;
  outline: none; color: var(--txt); background: var(--surface2);
}
.field input::placeholder { color: var(--txt3); }
.field input:focus { border-color: var(--blue); box-shadow: 0 0 0 2px var(--blue-dim); }

/* ── Sections ────────────────────────────────────────────────────────────── */
.section { border-bottom: 1px solid var(--line); }
.section-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 13px 16px; cursor: pointer; user-select: none;
}
.section-head:hover .section-title { color: var(--txt); }
.section-title {
  display: flex; align-items: center; gap: 8px;
  font-weight: 600; font-size: 11px; letter-spacing: .06em;
  text-transform: uppercase; color: var(--txt2);
  transition: color 120ms;
}

.badge {
  font-size: 9.5px; font-weight: 600; padding: 2px 7px; border-radius: 20px;
  letter-spacing: .02em;
  background: var(--surface3); color: var(--txt2);
}
.badge-green  { background: var(--green-dim);  color: var(--green); }
.badge-yellow { background: var(--amber-dim);  color: var(--amber); }
.badge-blue   { background: var(--blue-dim);   color: var(--blue);  }

.section-body { padding: 0 12px 14px; display: flex; flex-direction: column; gap: 8px; }
.section-body.collapsed { display: none; }
.chevron {
  font-size: 8px; color: var(--txt3);
  display: inline-block; transition: transform 150ms;
}

/* ── Items ───────────────────────────────────────────────────────────────── */
.item {
  border: 1px solid var(--line);
  border-radius: 10px; padding: 14px 16px;
  background: var(--surface);
  display: flex; flex-direction: column; gap: 11px;
  transition: border-color 150ms, background 150ms;
}
.item:hover { background: var(--surface2); border-color: var(--line2); }

.item-resolved { opacity: .45; }

.item-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 18px; }
.item-text {
  font-size: 13px; font-weight: 400; color: var(--txt);
  flex: 1; word-break: break-word; line-height: 1.6;
  white-space: pre-wrap;
}
.item-layers { font-size: 10.5px; color: var(--txt3); white-space: nowrap; flex-shrink: 0; padding-top: 3px; }
.item-id {
  font-family: var(--mono); font-size: 10.5px; color: var(--blue);
  background: var(--blue-dim); padding: 3px 8px; border-radius: var(--r-sm);
  display: inline-block; border: 1px solid color-mix(in srgb,var(--blue) 26%,transparent);
}
.item-similar { font-size: 12px; color: var(--txt2); line-height: 1.6; }
.item-similar strong {
  color: var(--txt); font-family: var(--mono); font-size: 10.5px;
  background: var(--blue-dim); padding: 2px 6px; border-radius: var(--r-sm);
  border: 1px solid color-mix(in srgb,var(--blue) 26%,transparent);
}
.item-actions { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; padding-top: 2px; }
.item-status { font-size: 11px; color: var(--txt2); }
.item-status.ok  { color: var(--green); font-weight: 500; }
.item-status.err { color: var(--red);   font-weight: 500; }
/* whitespace overlay — always-on visible spaces/breaks behind editor textareas */
.ws-field{position:relative;flex:1;min-width:0}
.ws-field textarea{background:transparent !important;position:relative;z-index:1}
.ws-backdrop{position:absolute;inset:0;margin:0;pointer-events:none;z-index:0;color:transparent;white-space:pre-wrap;overflow-wrap:break-word;word-break:break-word;overflow:hidden;box-sizing:border-box}
.ws-backdrop .ws-dot{background:radial-gradient(circle at 50% 56%, #e5409a 0 1.6px, transparent 2px)}
.ws-backdrop .ws-tab{color:#e5409a;opacity:.9}
.ws-backdrop .ws-nl{display:inline-block;width:0;overflow:visible;color:#e5409a;font-weight:700}
.tk-var{font-family:var(--mono);font-size:.88em;color:var(--blue);background:var(--blue-dim);border:1px solid color-mix(in srgb,var(--blue) 24%,transparent);border-radius:3px;padding:0 3px;white-space:nowrap}
.tk-plural{font-family:var(--mono);font-size:.88em;color:var(--amber);background:var(--amber-dim);border:1px solid color-mix(in srgb,var(--amber) 26%,transparent);border-radius:3px;padding:0 3px;white-space:nowrap}
.ann-tag{display:inline-flex;align-items:center;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--blue);background:var(--blue-dim);border:1px solid color-mix(in srgb,var(--blue) 26%,transparent);border-radius:3px;padding:1px 5px}

/* ── ID inputs ───────────────────────────────────────────────────────────── */
.id-row { display: flex; align-items: center; gap: 10px; }
.id-label {
  font-size: 10px; color: var(--txt3); white-space: nowrap;
  font-weight: 600; text-transform: uppercase; letter-spacing: .07em;
}
.id-input {
  flex: 1; font-family: var(--mono); font-size: 11.5px; color: var(--blue);
  border: 1px solid var(--line2); border-radius: var(--r-sm);
  padding: 6px 10px; outline: none; background: var(--bg);
}
.id-input::placeholder { color: var(--txt3); font-style: italic; }
.id-input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-dim); }
/* ID field: the entire box is contenteditable so prefix+suffix select as one run */
.id-prefix-wrap {
  display: block;
  background: var(--bg); border: 1px solid var(--line2); border-radius: var(--r-sm);
  font-family: var(--mono); font-size: 11.5px; color: var(--blue);
  padding: 6px 10px; white-space: nowrap; overflow: hidden;
  cursor: text; outline: none;
  transition: border-color 150ms, box-shadow 150ms;
}
.id-prefix-wrap:focus { border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-dim); }
textarea.id-input {
  resize: none; overflow: hidden; min-height: 34px;
  line-height: 1.55; font-family: inherit; font-size: 12.5px;
  color: var(--txt); font-family: inherit;
}

.id-select {
  font-family: var(--mono); font-size: 11.5px; color: var(--blue);
  background: var(--blue-dim); border: 1px solid color-mix(in srgb,var(--blue) 24%,transparent);
  border-radius: var(--r-sm); padding: 5px 9px; cursor: pointer;
  max-width: 260px; outline: none;
}
.id-select:focus { border-color: var(--blue); }
.id-select option { background: var(--surface2); color: var(--txt); }

/* ── Existing-component picker ───────────────────────────────────────────── */
.pick-search { width: 100%; font-size: 12px; font-family: inherit; color: var(--txt);
  background: var(--bg); border: 1px solid var(--line2); border-radius: var(--r-sm);
  padding: 7px 10px; outline: none; transition: border-color 150ms, box-shadow 150ms; }
.pick-search::placeholder { color: var(--txt3); }
.pick-search:focus { border-color: var(--blue); box-shadow: 0 0 0 2px var(--blue-dim); }
.pick-list { display: flex; flex-direction: column; gap: 3px; max-height: 196px; overflow-y: auto; }
.pick-row { display: flex; flex-direction: column; gap: 2px; text-align: left; width: 100%;
  cursor: pointer; background: var(--surface2); border: 1px solid var(--line);
  border-radius: var(--r-sm); padding: 7px 10px; font-family: inherit;
  transition: background 120ms, border-color 120ms; }
.pick-row:hover { background: var(--surface3); border-color: var(--line2); }
.pick-id { font-family: var(--mono); font-size: 11px; color: var(--blue);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.pick-text { font-size: 11px; color: var(--txt2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.pick-empty { padding: 12px; text-align: center; color: var(--txt3); font-size: 11px; }
.pick-tag { display: inline-block; font-size: 9px; font-weight: 700; letter-spacing: .04em;
  text-transform: uppercase; padding: 1px 5px; border-radius: 3px;
  background: var(--green-dim, #d1fae5); color: var(--green, #059669); margin-left: 4px; vertical-align: middle; }

/* ── Plural editor overlay ───────────────────────────────────────────────── */
.pl-ov { position: absolute; inset: 0; z-index: 50; background: var(--bg);
  display: none; flex-direction: column; }
.pl-ov.open { display: flex; }
.pl-ov-hd { display: flex; align-items: center; justify-content: space-between; gap: 8px;
  padding: 0 14px; height: 50px; border-bottom: 1px solid var(--line); flex-shrink: 0; }
.pl-ov-title { font-weight: 600; font-size: 13px; color: var(--txt); display: flex; align-items: center; gap: 7px; min-width: 0; }
.pl-ov-title code { font-family: var(--mono); font-size: 10.5px; color: var(--blue); background: var(--blue-dim);
  padding: 2px 6px; border-radius: var(--r-sm); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.pl-ov-body { flex: 1; overflow-y: auto; padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; }
.pl-ov-ft { display: flex; justify-content: flex-end; gap: 8px; padding: 10px 14px; border-top: 1px solid var(--line); flex-shrink: 0; }
.plf-card { border: 1px solid var(--line); border-radius: 10px; background: var(--surface); padding: 11px 12px; }
.plf-hd { display: flex; align-items: center; gap: 7px; margin-bottom: 9px; }
.plf-name { font-family: var(--mono); font-size: 12px; font-weight: 600; color: var(--txt); }
.plf-master { font-size: 8.5px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; color: var(--amber);
  background: var(--amber-dim); padding: 1px 5px; border-radius: 20px; }
.plf-sp { flex: 1; }
.plf-move { display: inline-flex; flex-direction: column; line-height: 0; }
.plf-move button, .plf-x { background: none; border: none; cursor: pointer; color: var(--txt3); padding: 0 2px; }
.plf-move button { font-size: 8px; line-height: 1.1; }
.plf-move button:hover:not(:disabled), .plf-x:hover { color: var(--blue); }
.plf-move button:disabled { opacity: .25; cursor: default; }
.plf-x:hover { color: var(--red); }
.plf-row { display: grid; grid-template-columns: 64px 1fr; gap: 8px; align-items: start; margin-top: 6px; }
.plf-lang { font-size: 10.5px; color: var(--txt3); padding-top: 7px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.plf-lang.base { color: var(--amber); font-weight: 600; }
.plf-ta { width: 100%; background: var(--bg); border: 1px solid var(--line2); border-radius: var(--r-sm);
  color: var(--txt); font-family: inherit; font-size: 12px; line-height: 1.5; padding: 6px 8px; outline: none; resize: vertical; min-height: 32px; }
.plf-ta:focus { border-color: var(--blue); box-shadow: 0 0 0 2px var(--blue-dim); }
.pl-addrow { display: flex; align-items: center; gap: 8px; }
.pl-addrow select { height: 30px; background: var(--surface2); border: 1px solid var(--line2); border-radius: var(--r);
  color: var(--txt); font-family: inherit; font-size: 12px; padding: 0 8px; outline: none; }

/* ── Toggle ──────────────────────────────────────────────────────────────── */
.toggle-label {
  display: flex; align-items: center; gap: 6px;
  cursor: pointer; user-select: none;
}
.toggle-input { display: none; }
.toggle-track {
  position: relative; width: 26px; height: 14px;
  background: var(--surface3); border-radius: 7px;
  border: 1px solid var(--line2);
  transition: background 150ms, border-color 150ms; flex-shrink: 0;
}
.toggle-thumb {
  position: absolute; top: 2px; left: 2px;
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--txt3);
  transition: transform 150ms, background 150ms;
}
.toggle-input:checked + .toggle-track {
  background: var(--blue-dim); border-color: color-mix(in srgb,var(--blue) 40%,transparent);
}
.toggle-input:checked + .toggle-track .toggle-thumb {
  background: var(--blue); transform: translateX(12px);
}
.toggle-text { font-size: 10px; color: var(--txt2); }
.toggle-label:hover .toggle-text { color: var(--txt); }

/* ── Done banner ─────────────────────────────────────────────────────────── */
.done-banner {
  padding: 48px 24px; text-align: center;
  color: var(--txt2); font-size: 13px; line-height: 1.8;
}
</style>
<script>
/* set theme before first paint to avoid a flash */
(function(){
  try {
    var saved = localStorage.getItem('dittomato.theme');
    if (saved !== 'light' && saved !== 'dark') {
      saved = (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) ? 'light' : 'dark';
    }
    document.documentElement.dataset.theme = saved;
  } catch(e) { document.documentElement.dataset.theme = 'dark'; }
})();
</script>
</head>
<body>

<div class="hd">
  <div class="hd-title">🍅 Dittomato</div>
  <div class="hd-actions" style="align-items:center">
    <label class="toggle-label" for="autoScanChk">
      <input type="checkbox" id="autoScanChk" checked onchange="setAutoScan(this.checked)" class="toggle-input">
      <span class="toggle-track"><span class="toggle-thumb"></span></span>
      <span class="toggle-text">Auto-scan</span>
    </label>
    <label class="toggle-label" for="ignoreHiddenChk">
      <input type="checkbox" id="ignoreHiddenChk" checked onchange="setIgnoreHidden(this.checked)" class="toggle-input">
      <span class="toggle-track"><span class="toggle-thumb"></span></span>
      <span class="toggle-text">Skip hidden</span>
    </label>
    <button class="btn btn-ghost btn-sm" id="scanBtn" onclick="rescan()" disabled><i class="ph ph-arrow-clockwise" style="font-size:13px"></i> Scan</button>
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle light / dark theme" aria-label="Toggle theme">
      <i class="ph ph-sun ti-sun" style="font-size:15px"></i>
      <i class="ph ph-moon ti-moon" style="font-size:15px"></i>
    </button>
  </div>
</div>

<div class="content">

  <!-- Setup -->
  <div id="sSetup" style="display:none">
    <div class="setup">
      <div class="field">
        <label>Ditto API key</label>
        <input type="password" id="keyInput" placeholder="Paste your API key…" oninput="onKeyInput(this.value)" onkeydown="if(event.key==='Enter')saveKey()" />
      </div>
      <button class="btn btn-primary" id="saveKeyBtn" onclick="saveKey()" disabled>Save &amp; Scan</button>
      <p style="font-size:10px;color:var(--txt3)">Stored locally — never leaves your browser.</p>
    </div>
  </div>

  <!-- Loading -->
  <div id="sLoading" style="display:none">
    <div class="state"><div class="spinner"></div><p id="loadMsg">Loading…</p></div>
  </div>

  <!-- No selection -->
  <div id="sNone" style="display:none">
    <div class="state">
      <p>Select a <strong>frame</strong> or <strong>section</strong> in Figma,<br>then click <strong><i class="ph ph-arrow-clockwise"></i> Scan</strong>.</p>
    </div>
  </div>

  <!-- No text found -->
  <div id="sNoText" style="display:none">
    <div class="state"><p>No text layers found in selection.</p></div>
  </div>

  <!-- Results -->
  <div id="sResults" style="display:none">

    <!-- Matched -->
    <div class="section" id="secMatched" style="display:none">
      <div class="section-head" id="secMatchedHead" onclick="toggleSec('matched')">
        <div class="section-title">
          <span class="chevron" id="chevMatched">▶</span>
          <i class="ph ph-check-circle" style="font-size:14px"></i> Matched
          <span class="badge badge-green" id="matchedBadge">0</span>
        </div>
        <button class="btn btn-green btn-sm" id="renameAllBtn" onclick="event.stopPropagation();renameAllMatched()">Rename layers</button>
      </div>
      <div class="section-body collapsed" id="matchedBody"></div>
    </div>

    <!-- Near match -->
    <div class="section" id="secNear" style="display:none">
      <div class="section-head" style="cursor:default">
        <div class="section-title">
          <i class="ph ph-magnifying-glass" style="font-size:14px"></i> Near match
          <span class="badge badge-yellow" id="nearBadge">0</span>
        </div>
      </div>
      <div class="section-body" id="nearBody"></div>
    </div>

    <!-- New -->
    <div class="section" id="secNew" style="display:none">
      <div class="section-head" style="cursor:default">
        <div class="section-title">
          <i class="ph ph-plus" style="font-size:14px"></i> New
          <span class="badge badge-blue" id="newBadge">0</span>
        </div>
        <button class="btn btn-primary btn-sm" onclick="pushAllNew()">Push all</button>
      </div>
      <div style="padding:8px 12px 10px;border-bottom:1px solid var(--line)">
        <div class="id-row">
          <span class="id-label" style="min-width:60px">ID prefix</span>
          <input class="id-input" id="newPrefixInp" placeholder="e.g. buttons."
                 oninput="var v=sanitizeId(this.value);this.value=v;updateNewPrefix(v)"
                 style="color:var(--txt2)" />
        </div>
      </div>
      <div class="section-body" id="newBody"></div>

    <!-- Ignored -->
    <div class="section" id="secIgnored" style="display:none">

        <div class="section-title">
          <span class="chevron" id="chevIgnored">▶</span>
          <span style="font-family:var(--mono);color:var(--txt3);font-size:11px;margin-right:2px">//</span> Ignored
          <span class="badge" id="ignoredBadge" style="background:var(--surface3);color:var(--txt3)">0</span>
        </div>
      </div>
      <div class="section-body collapsed" id="ignoredBody"></div>

    <!-- All done -->
    <div class="done-banner" id="doneBanner" style="display:none">
      All strings are accounted for. 🍅
    </div>

    <div style="padding:10px 14px;border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-between">
      <span id="pluginVersion" style="font-size:10px;color:var(--txt3);font-family:var(--mono)"></span>
      <button class="btn btn-ghost btn-sm" onclick="showSetup()" style="font-size:10px;color:var(--txt3);border-color:transparent">API key</button>
    </div>

  </div>

</div><!-- /content -->

<!-- Translate canvas bar — visible when matched items + variants exist -->
<div id="translateBar" style="display:none;padding:12px 16px 14px;border-top:1px solid var(--line);background:var(--bg);flex-shrink:0">
  <div style="display:flex;align-items:center;gap:9px">
    <span style="font-size:11px;font-weight:600;color:var(--txt2);white-space:nowrap;letter-spacing:.03em;text-transform:uppercase;display:inline-flex;align-items:center;gap:5px"><i class="ph ph-translate" style="font-size:14px"></i> Translate</span>
    <select id="translateVariantSel" class="id-select" style="flex:1;max-width:none" onchange="applyTranslation()"></select>
  </div>
  <div id="translateStatus" style="font-size:11px;color:var(--txt2);margin-top:5px;min-height:16px"></div>
</div>

<!-- Plural editor overlay -->
<div class="pl-ov" id="plOverlay">
  <div class="pl-ov-hd">
    <div class="pl-ov-title"><span><i class="ph ph-list-numbers" style="font-size:15px"></i> Plural forms</span><code id="plOvId"></code></div>
    <button class="theme-toggle" onclick="closePluralPanel()" aria-label="Close" style="border:none;background:none">
      <i class="ph ph-x" style="font-size:18px"></i>
    </button>
  </div>
  <div class="pl-ov-body" id="plOvBody"></div>
  <div class="pl-ov-ft">
    <button class="btn btn-ghost btn-sm" onclick="closePluralPanel()">Cancel</button>
    <button class="btn btn-primary btn-sm" id="plOvSave" onclick="savePluralPanel()" disabled>Save plural forms</button>
  </div>
</div>

<script>
function toggleTheme() {
  var next = document.documentElement.dataset.theme === 'light' ? 'dark' : 'light';
  document.documentElement.dataset.theme = next;
  try { localStorage.setItem('dittomato.theme', next); } catch(e) {}
}

const API = 'https://api.dittowords.com/v2';
const VERSION = '1.20.7';
let _key  = ''; // loaded from figma.clientStorage via code.js

// ── State ──────────────────────────────────────────────────────────────────
let st = {
  matched:  [],  // { text, nodeIds, layerNames, comp, alreadyApplied }
  near:     [],  // { text, nodeIds, layerNames, comp, decision: null|'use'|'new' }
  newItems: [],  // { text, nodeIds, layerNames, id }
  ignored:  [],  // { nodeId, layerName, text } — layers prefixed with //
};
let _newPrefix = ''; // folder prefix for all new IDs
let _silentRescan = false; // suppress loading spinner on post-push auto-rescan
let _allComps = []; // real Ditto components (no variant/plural rows) — for ID detection
let _justPushed = new Set(); // ids created this session — plural authoring is offered post-push
let _compVariantCoverage = { requiredForms: new Map(), got: new Map() }; // plural-aware coverage

// ── Helpers ────────────────────────────────────────────────────────────────
const norm  = s => s.toLowerCase().replace(/[^a-z0-9]/g, '');
const esc   = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const trunc = (s, n) => s.length > n ? s.slice(0, n) + '…' : s;

// ── Plurals ──────────────────────────────────────────────────────────────
// Ditto returns each plural form as its own row: id "base_<form>" carrying a
// `pluralForm` field, with translations stored on those form rows. They must not
// be treated as standalone components.
var PLURAL_FORMS = ['zero','one','two','few','many','other'];
function isPluralRow(c) { return !!(c && c.pluralForm != null); }
function baseIdOf(c) {
  return (c.pluralForm && c.id && c.id.endsWith('_' + c.pluralForm))
    ? c.id.slice(0, -(c.pluralForm.length + 1)) : (c ? c.id : c);
}
// Build plural-aware variant coverage from the all-variants rows.
function buildCoverage(allRows) {
  var requiredForms = new Map(); // baseId -> Set(form)  ('_base' = non-plural)
  var got = new Map();           // baseId -> Map(variantId -> Set(form) translated)
  for (var i = 0; i < allRows.length; i++) {
    var c = allRows[i];
    if (!c.text) continue;
    var base = baseIdOf(c), form = c.pluralForm || '_base';
    if (!c.variantId) {
      if (!requiredForms.has(base)) requiredForms.set(base, new Set());
      requiredForms.get(base).add(form);
    } else {
      if (!got.has(base)) got.set(base, new Map());
      var m = got.get(base);
      if (!m.has(c.variantId)) m.set(c.variantId, new Set());
      m.get(c.variantId).add(form);
    }
  }
  requiredForms.forEach(function(forms) {
    var hasReal = false; forms.forEach(function(f){ if (f !== '_base') hasReal = true; });
    if (hasReal) forms.delete('_base');
  });
  return { requiredForms: requiredForms, got: got };
}
function highlightText(s) {
  var str = String(s || '');
  if (!str) return '';
  var re = /\{\{[^}]+\}\}|\{[a-zA-Z_]\w*\s*,\s*(?:plural|select)\b(?:[^{}]|\{[^{}]*\})*\}/g;
  var out = '', last = 0, m;
  while ((m = re.exec(str)) !== null) {
    out += esc(str.slice(last, m.index));
    var tok = m[0];
    out += '<span class="' + (tok.startsWith('{{') ? 'tk-var' : 'tk-plural') + '">' + esc(tok) + '</span>';
    last = m.index + tok.length;
  }
  return out + esc(str.slice(last));
}

// ── Whitespace overlay (always-on) — paints dots in spaces + ¶ at breaks
// behind the plural-editor textareas, perfectly aligned with the text.
function wsBackdropHtml(text) {
  return esc(String(text == null ? '' : text))
    .replace(/ /g, '<span class="ws-dot"> </span>')
    .replace(/\t/g, '<span class="ws-tab">\t</span>')
    .replace(/\n/g, '<span class="ws-nl">¶</span>\n') + '​';
}
function syncWs(ta) { if (ta && ta._wsBd) ta._wsBd.innerHTML = wsBackdropHtml(ta.value); }
function mountWs(ta) {
  if (!ta || ta._wsMounted) { syncWs(ta); return; }
  ta._wsMounted = true;
  var wrap = document.createElement('div'); wrap.className = 'ws-field';
  ta.parentNode.insertBefore(wrap, ta); wrap.appendChild(ta);
  var bd = document.createElement('div'); bd.className = 'ws-backdrop'; bd.setAttribute('aria-hidden', 'true');
  wrap.insertBefore(bd, ta); ta._wsBd = bd;
  var cs = getComputedStyle(ta);
  ['fontFamily','fontSize','fontWeight','fontStyle','lineHeight','letterSpacing','wordSpacing','paddingTop','paddingRight','paddingBottom','paddingLeft','borderTopWidth','borderRightWidth','borderBottomWidth','borderLeftWidth','textIndent','tabSize'].forEach(function(p) { bd.style[p] = cs[p]; });
  bd.style.borderStyle = 'solid'; bd.style.borderColor = 'transparent';
  ta.addEventListener('input', function() { syncWs(ta); });
  syncWs(ta);
}

function sanitizeId(raw) {
  // Live sanitizer — keeps trailing hyphen/dot so user can continue typing
  return raw.toLowerCase()
    .replace(/ /g, '-')
    .replace(/[^a-z0-9.\-]/g, '')
    .replace(/-+/g, '-').replace(/\.+/g, '.');
}

function sanitizeIdFinal(raw) {
  // Strip leading/trailing separators for final use in push
  return sanitizeId(raw).replace(/^[-.]|[-.]$/g, '');
}

function suggestId(text) {
  // Split camelCase/PascalCase into words before kebab-converting:
  //   "SaveAsRoute"  → "Save As Route"  → "save-as-route"
  //   "XMLParser"    → "XML Parser"     → "xml-parser"
  var spaced = text
    .replace(/([a-z])([A-Z])/g, '$1 $2')
    .replace(/([A-Z]+)([A-Z][a-z])/g, '$1 $2');
  return sanitizeIdFinal(spaced.replace(/\s+/g, '-')).slice(0, 60) || 'new-string';
}

function getDittoKey() { return _key; }

function setIgnoreHidden(val) {
  _silentRescan = true; // option change triggers an immediate rescan in code.js
  parent.postMessage({ pluginMessage: { type: 'set-options', options: { ignoreHidden: val } } }, '*');
}
function setAutoScan(val) {
  _silentRescan = true;
  parent.postMessage({ pluginMessage: { type: 'set-options', options: { autoScan: val } } }, '*');
}

// Returns an array of variant names/ids missing a translation for the given compId.
// Plural-aware: a variant is covered only when every plural form is translated.
function getMissingVariants(compId) {
  if (!compId || !_variants || !_variants.length) return [];
  var cov = _compVariantCoverage || { requiredForms: new Map(), got: new Map() };
  var req = cov.requiredForms.get(compId) || new Set(['_base']);
  var vmap = cov.got.get(compId) || new Map();
  return _variants.filter(function(v) {
    var has = vmap.get(v.id) || new Set();
    var missing = false;
    req.forEach(function(f) { if (!has.has(f)) missing = true; });
    return missing;
  }).map(function(v) { return v.name || v.id; });
}

function missingVariantHtml(compId) {
  var missing = getMissingVariants(compId);
  if (!missing.length) return '';
  return '<div style="font-size:10px;color:var(--amber);margin-top:5px"><i class="ph ph-warning" style="font-size:11px;vertical-align:-1px"></i> Missing translations: ' + esc(missing.join(', ')) + '</div>';
}
function annotationBadge(item) {
  if (item.fromAnnotation) return '<span class="ann-tag" title="ID was set via a Figma annotation">annotation</span> ';
  if (item.textIsId) return '<span class="ann-tag" title="Layer text is a Ditto ID">ID in layer</span> ';
  return '';
}
function variantTag(m) {
  if (!m.matchedVariant) return '';
  return '<span class="ann-tag" style="color:var(--amber);background:var(--amber-dim);border-color:color-mix(in srgb,var(--amber) 28%,transparent)" title="Matches the ' +
    esc(m.matchedVariant.name) + ' translation of this component">' + esc(m.matchedVariant.name) + '</span> ';
}
function pluralBtn(compId) {
  if (!_justPushed.has(compId)) return ''; // only after this component was pushed from here
  return '<div><button class="btn btn-ghost btn-sm" style="margin-top:6px;font-size:10px;padding:4px 9px" onclick="openPluralPanel(\'' + esc(compId).replace(/'/g, "\\'") + '\')"><i class="ph ph-list-numbers"></i> Add plural forms</button></div>';
}
function itemBadges(m) {
  var b = annotationBadge(m) + variantTag(m);
  return b ? '<div style="margin-top:4px">' + b + '</div>' : '';
}

// Handler for the contenteditable ID wrapper. The wrapper contains an optional
// non-editable prefix span followed by a plain text node for the suffix.
// We read only text nodes (node.nodeType===3) to extract just the suffix.
function suffixInput(i, wrapper) {
  var suffix = '';
  var tnode = null;
  for (var n = wrapper.firstChild; n; n = n.nextSibling) {
    if (n.nodeType === 3) { suffix += n.textContent; tnode = n; }
  }
  var v = sanitizeId(suffix);
  st.newItems[i].id = v;
  if (suffix !== v && tnode) {
    var sel = window.getSelection();
    var off = (sel.rangeCount && sel.getRangeAt(0).startContainer === tnode)
      ? sel.getRangeAt(0).startOffset : v.length;
    tnode.textContent = v;
    try {
      var r = document.createRange();
      r.setStart(tnode, Math.min(off, v.length));
      r.collapse(true);
      sel.removeAllRanges();
      sel.addRange(r);
    } catch(e) {}
  }
  checkNewIdMatch(i);
}

// Check if the New item at index i has a typed ID that matches an existing Ditto
// component. If yes, swap the Push button for a green Link button.
function checkNewIdMatch(i) {
  var item = st.newItems[i];
  if (!item) return;
  var local = item.id || '';
  var composed = sanitizeIdFinal(_newPrefix + local);
  var raw = sanitizeIdFinal(local);
  var found = (composed && _allComps.find(function(c) { return c.id === composed; })) ||
              (raw && raw !== composed && _allComps.find(function(c) { return c.id === raw; }));
  var pushBtn = document.getElementById('npushbtn-' + i);
  var linkBtn = document.getElementById('nlinkbtn-' + i);
  if (found) {
    if (pushBtn) pushBtn.style.display = 'none';
    if (linkBtn) { linkBtn.style.display = ''; linkBtn.title = 'Link to: ' + found.id; }
  } else {
    if (pushBtn) pushBtn.style.display = '';
    if (linkBtn) linkBtn.style.display = 'none';
  }
}

// Rename the Figma layers for New item i to the matched existing component ID,
// then rescan — no Ditto API call needed.
function linkToExisting(i) {
  var item = st.newItems[i];
  if (!item) return;
  var local = item.id || '';
  var composed = sanitizeIdFinal(_newPrefix + local);
  var raw = sanitizeIdFinal(local);
  var found = (composed && _allComps.find(function(c) { return c.id === composed; })) ||
              (raw && raw !== composed && _allComps.find(function(c) { return c.id === raw; }));
  if (!found) return;
  var renames = item.nodeIds.map(function(nid) { return { nodeId: nid, newName: found.id }; });
  _silentRescan = true;
  parent.postMessage({ pluginMessage: { type: 'rename-and-rescan', renames: renames } }, '*');
}

// ── Select existing component (fuzzy picker for New items) ──────────────────
// Rank existing components against a query (id/text substring) or, when the
// query is empty, by word overlap with the new string's text.
function existingMatches(item, query) {
  var comps = _allComps || [];
  var q = String(query || '').toLowerCase().trim();
  if (q) {
    var scored = [];
    for (var i = 0; i < comps.length; i++) {
      var id = (comps[i].id || '').toLowerCase();
      var tx = (comps[i].text || '').toLowerCase();
      var s = -1;
      if (id === q || tx === q) s = 100;
      else if (id.indexOf(q) === 0) s = 80;
      else if (tx.indexOf(q) >= 0) s = 60;
      else if (id.indexOf(q) >= 0) s = 50;
      if (s >= 0) scored.push({ c: comps[i], s: s });
    }
    scored.sort(function(a, b) { return b.s - a.s || (a.c.id || '').length - (b.c.id || '').length; });
    return scored.slice(0, 8).map(function(x) { return x.c; });
  }
  // Empty query — exact text matches first, then word overlap.
  var itlc = String(item.text || '').toLowerCase().trim();
  var itnorm = norm(item.text || '');
  var wset = {};
  itlc.split(/[^a-z0-9]+/).forEach(function(w) { if (w) wset[w] = 1; });
  var ranked = [];
  for (var i = 0; i < comps.length; i++) {
    var clc = (comps[i].text || '').toLowerCase().trim();
    var cnorm = norm(comps[i].text || '');
    var s = 0;
    if (clc === itlc || cnorm === itnorm) s = 200;       // exact text match
    else if (itlc && clc.indexOf(itlc) >= 0) s = 100;   // item text is substring of comp text
    else {
      var tw = clc.split(/[^a-z0-9]+/);
      for (var k = 0; k < tw.length; k++) if (tw[k] && wset[tw[k]]) s++;
    }
    if (s > 0) ranked.push({ c: comps[i], s: s });
  }
  ranked.sort(function(a, b) { return b.s - a.s || (a.c.id || '').length - (b.c.id || '').length; });
  return ranked.slice(0, 8).map(function(x) { return x.c; });
}

function renderPickList(i) {
  var item = st.newItems[i];
  if (!item) return '';
  var matches = existingMatches(item, item.pickQuery || '');
  if (!matches.length) {
    return '<div class="pick-empty">' + (item.pickQuery ? 'No matching components' : 'Type to search, or pick a suggestion above') + '</div>';
  }
  var itlc = (item.text || '').toLowerCase().trim();
  return matches.map(function(c) {
    var id = String(c.id || '');
    var isExact = !item.pickQuery && (c.text || '').toLowerCase().trim() === itlc;
    return '<button class="pick-row" onclick="applyExisting(' + i + ',\'' + id.replace(/\\/g, '\\\\').replace(/'/g, "\\'") + '\')">' +
      '<div style="display:flex;align-items:center;gap:4px">' +
        '<span class="pick-id">' + esc(id) + '</span>' +
        (isExact ? '<span class="pick-tag">exact</span>' : '') +
      '</div>' +
      (c.text ? '<span class="pick-text">' + esc(trunc(c.text, 52)) + '</span>' : '') +
    '</button>';
  }).join('');
}

function startPickExisting(i) {
  if (!st.newItems[i]) return;
  st.newItems[i].picking = true;
  st.newItems[i].pickQuery = '';
  renderResults();
  setTimeout(function() { var el = document.getElementById('pick-q-' + i); if (el) el.focus(); }, 0);
}
function cancelPick(i) {
  if (!st.newItems[i]) return;
  st.newItems[i].picking = false;
  renderResults();
}
function filterPick(i, q) {
  if (!st.newItems[i]) return;
  st.newItems[i].pickQuery = q;
  var list = document.getElementById('pick-list-' + i);
  if (list) list.innerHTML = renderPickList(i); // partial update keeps input focus
}
function applyExisting(i, id) {
  var item = st.newItems[i];
  if (!item || !id || item._applying) return;
  item._applying = true;
  item.picking = false;
  renderResults();
  var renames = item.nodeIds.map(function(nid) { return { nodeId: nid, newName: id }; });
  _silentRescan = true;
  parent.postMessage({ pluginMessage: { type: 'rename-and-rescan', renames: renames } }, '*');
}

// ── Near-match "Link to existing" picker ───────────────────────────────────
function renderNearPickList(i) {
  var n = st.near[i];
  if (!n) return '';
  var matches = existingMatches({ text: n.text }, n.pickQuery || '');
  if (!matches.length) {
    return '<div class="pick-empty">' + (n.pickQuery ? 'No matching components' : 'Type to search, or pick a suggestion above') + '</div>';
  }
  var itlc = (n.text || '').toLowerCase().trim();
  return matches.map(function(c) {
    var id = String(c.id || '');
    var isExact = !n.pickQuery && (c.text || '').toLowerCase().trim() === itlc;
    return '<button class="pick-row" onclick="applyNearExisting(' + i + ',\'' + id.replace(/\\/g, '\\\\').replace(/'/g, "\\'") + '\')">' +
      '<div style="display:flex;align-items:center;gap:4px">' +
        '<span class="pick-id">' + esc(id) + '</span>' +
        (isExact ? '<span class="pick-tag">exact</span>' : '') +
      '</div>' +
      (c.text ? '<span class="pick-text">' + esc(trunc(c.text, 52)) + '</span>' : '') +
    '</button>';
  }).join('');
}
function startNearPickExisting(i) {
  if (!st.near[i]) return;
  st.near[i].picking = true;
  st.near[i].pickQuery = '';
  renderResults();
  setTimeout(function() { var el = document.getElementById('near-pick-q-' + i); if (el) el.focus(); }, 0);
}
function cancelNearPick(i) {
  if (!st.near[i]) return;
  st.near[i].picking = false;
  renderResults();
}
function filterNearPick(i, q) {
  if (!st.near[i]) return;
  st.near[i].pickQuery = q;
  var list = document.getElementById('near-pick-list-' + i);
  if (list) list.innerHTML = renderNearPickList(i);
}
function applyNearExisting(i, id) {
  var n = st.near[i];
  if (!n || !id || n._applying) return;
  n._applying = true;
  n.picking = false;
  var el = document.getElementById('ni-near-' + i);
  if (el) el.outerHTML = renderNear(n, i);
  var renames = n.nodeIds.map(function(nid) { return { nodeId: nid, newName: id }; });
  _silentRescan = true;
  parent.postMessage({ pluginMessage: { type: 'rename-and-rescan', renames: renames } }, '*');
}

// Rename layers with // prefix so they are excluded from all future scans.
function _disableItemBtns(btn) {
  if (!btn) return;
  btn.disabled = true; btn.textContent = '…';
  var itemEl = btn.closest('.item');
  if (itemEl) {
    var sibs = itemEl.querySelectorAll('button');
    for (var b = 0; b < sibs.length; b++) {
      if (sibs[b] !== btn) sibs[b].style.display = 'none';
    }
  }
}

function ignoreNew(i, btn) {
  _disableItemBtns(btn);
  var item = st.newItems[i];
  if (!item) return;
  var renames = item.nodeIds.map(function(nid, li) {
    return { nodeId: nid, newName: '//' + (item.layerNames[li] || 'layer') };
  });
  _silentRescan = true;
  parent.postMessage({ pluginMessage: { type: 'rename-and-rescan', renames: renames } }, '*');
}

function ignoreNear(i, btn) {
  _disableItemBtns(btn);
  var item = st.near[i];
  if (!item) return;
  var renames = item.nodeIds.map(function(nid, li) {
    return { nodeId: nid, newName: '//' + (item.layerNames[li] || 'layer') };
  });
  _silentRescan = true;
  parent.postMessage({ pluginMessage: { type: 'rename-and-rescan', renames: renames } }, '*');
}

function unignore(i, btn) {
  _disableItemBtns(btn);
  var item = st.ignored[i];
  if (!item) return;
  var newName = item.layerName.replace(/^\/\//, '');
  _silentRescan = true;
  parent.postMessage({ pluginMessage: { type: 'rename-and-rescan', renames: [{ nodeId: item.nodeId, newName: newName }] } }, '*');
}

// ── Variants cache ─────────────────────────────────────────────────────────

// ── Ditto API ──────────────────────────────────────────────────────────────
async function fetchComps(key) {

async function postComp(key, name, text, developerId, variants) {
  // Step 1 — create the base component
  const res = await fetch(`${API}/components`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', Authorization: key },
    body: JSON.stringify({ components: [{ name, text, developerId }] }),
  });
  if (!res.ok) {
    const e = await res.json().catch(() => ({}));
    throw new Error(e.message || `HTTP ${res.status}`);
  }
  const data = await res.json();

  // Step 2 — PATCH each variant translation separately (same as index.html)
  if (variants) {
    var vids = Object.keys(variants);
    for (var vi = 0; vi < vids.length; vi++) {
      var vtext = variants[vids[vi]];
      if (!vtext) continue;
      await fetch(`${API}/components`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', Authorization: key },
        body: JSON.stringify({ updates: [{ developerId: developerId, text: vtext }], variantId: vids[vi] }),
      });
    }
  }

  return data;
}

// ── Matching ───────────────────────────────────────────────────────────────
function matchNodes(nodes, comps, variantRows) {
  // Build canonical (base) comp per BASE id — prefer the real base row (no variant,
  // no plural form). Plural-form rows resolve to their base component so a Figma
  // layer holding a plural form's text/id links to the base, never to "id_other".
  const canonical = new Map();
  for (const c of comps) {
    if (!c.id) continue;
    const bid = baseIdOf(c);
    const isTrueBase = !c.variantId && !isPluralRow(c);
    if (!canonical.has(bid) || isTrueBase) canonical.set(bid, c);
  }

  const byExact      = new Map(); // lowercase text -> [comp, ...]
  const byNorm       = new Map();
  const byId         = new Map();
  const byDeveloperId = new Map(); // component id (or plural-form id) -> base comp
  for (const c of comps) {
    const base = (c.id && canonical.get(baseIdOf(c))) || c;
    if (c.id) {
      if (!byDeveloperId.has(c.id)) byDeveloperId.set(c.id, base);
      const n = norm(c.id);
      if (!byId.has(n)) byId.set(n, base);
    }
    if (c.text) {
      const lc = c.text.toLowerCase();
      if (!byExact.has(lc)) byExact.set(lc, []);
      if (!byExact.get(lc).some(function(x) { return x.id === base.id; })) byExact.get(lc).push(base);
      const n = norm(c.text);
      if (!byNorm.has(n)) byNorm.set(n, base);
    }
  }

  // Index variant (translation) texts so a Figma layer holding e.g. the German
  // string still resolves to its component — tagged with which language matched.
  const variantName = {};
  for (var vi2 = 0; vi2 < (_variants || []).length; vi2++) variantName[_variants[vi2].id] = _variants[vi2].name || _variants[vi2].id;
  const byVariantExact = new Map(); // lowercase variant text -> [{ comp, variant }]
  const byVariantNorm  = new Map();
  const variantsByComp = new Map(); // comp id -> [{ id, name, text }] of its translations
  for (var vr = 0; vr < (variantRows || []).length; vr++) {
    var row = variantRows[vr];
    var key = row.developerId || row.id;
    if (!key || !row.text) continue;
    var base2 = canonical.get(baseIdOf(row)) || byDeveloperId.get(key);
    if (!base2) continue;
    var variant = { id: row.variantId, name: variantName[row.variantId] || row.variantId, text: row.text };
    var lc2 = row.text.toLowerCase();
    if (!byVariantExact.has(lc2)) byVariantExact.set(lc2, []);
    byVariantExact.get(lc2).push({ comp: base2, variant: variant });
    var n2 = norm(row.text);
    if (!byVariantNorm.has(n2)) byVariantNorm.set(n2, { comp: base2, variant: variant });
    if (!variantsByComp.has(base2.id)) variantsByComp.set(base2.id, []);
    variantsByComp.get(base2.id).push(variant);
  }

  // Index plural-form texts per base component so a Figma layer holding e.g.
  // "Images" (the _other form of "Image") is recognised as synced, not drift.
  const pluralsByComp = new Map(); // base comp id -> [{ form, text }]
  for (const c of comps) {
    if (!isPluralRow(c) || !c.text) continue;
    const bid = baseIdOf(c);
    const base = canonical.get(bid);
    if (!base) continue;
    if (!pluralsByComp.has(base.id)) pluralsByComp.set(base.id, []);
    pluralsByComp.get(base.id).push({ form: c.pluralForm, text: c.text });
  }

  // For an already-linked layer (name === component id) whose text differs from
  // the base, return the matching translation or plural form so it is recognised
  // as synced — not mis-flagged as drifted/changed text.
  function resolveDisplayVariant(comp, text) {
    if (!comp || !comp.text || text === comp.text) return null;
    var lc = text.toLowerCase(), nn = norm(text);
    var arr = variantsByComp.get(comp.id);
    if (arr) {
      for (var k = 0; k < arr.length; k++) {
        if (arr[k].text && (arr[k].text.toLowerCase() === lc || norm(arr[k].text) === nn)) return arr[k];
      }
    }
    // Check plural forms — "Images" is the _other form of "Image"
    var pforms = pluralsByComp.get(comp.id);
    if (pforms) {
      for (var k = 0; k < pforms.length; k++) {
        if (pforms[k].text && (pforms[k].text.toLowerCase() === lc || norm(pforms[k].text) === nn)) {
          return { id: '_plural_' + pforms[k].form, name: pforms[k].form, text: pforms[k].text, isPluralForm: true };
        }
      }
    }
    // byExact fallback: if this text maps to the same base comp via any indexed row
    // (covers plural forms even when pluralsByComp is incomplete)
    var exactHits = byExact.get(lc);
    if (exactHits && exactHits.some(function(c2) { return c2.id === comp.id; })) {
      return { id: '_plural', name: 'plural form', text: text, isPluralForm: true };
    }
    return null;
  }

  // Group nodes by text (many layers can share the same string)
  const byText = new Map();
  for (const node of nodes) {
    if (!byText.has(node.text)) byText.set(node.text, { nodeIds: [], layerNames: [], annotationId: null });
    const g = byText.get(node.text);
    g.nodeIds.push(node.nodeId);
    g.layerNames.push(node.layerName);
    if (node.annotationId && !g.annotationId) g.annotationId = node.annotationId;
  }

  const matched = [], near = [], newItems = [];
  for (const [text, { nodeIds, layerNames, annotationId }] of byText) {
    const n = norm(text);

    // Annotation ID — explicit Ditto ID from a Figma Dev Mode annotation (highest priority)
    if (annotationId) {
      var annComp = byDeveloperId.get(annotationId) || byId.get(norm(annotationId));
      if (annComp) {
        var allApplied = layerNames.every(function(ln) { return ln === annComp.id; });
        matched.push({ text, nodeIds, layerNames, comp: annComp, candidates: [annComp], alreadyApplied: allApplied, fromAnnotation: true, matchedVariant: resolveDisplayVariant(annComp, text) });
      } else {
        newItems.push({ text, nodeIds, layerNames, id: annotationId, fromAnnotation: true });
      }
      continue;
    }

    // Layer-name match: any layer already renamed to a known Ditto component ID
    var layerComp = null;
    for (var li = 0; li < layerNames.length; li++) {
      var lc = byDeveloperId.get(layerNames[li]);
      if (lc) { layerComp = lc; break; }
    }
    if (layerComp) {
      var allApplied = layerNames.every(function(ln) { return ln === layerComp.id; });
      matched.push({ text: text, nodeIds: nodeIds, layerNames: layerNames, comp: layerComp, candidates: [layerComp], alreadyApplied: allApplied, matchedVariant: resolveDisplayVariant(layerComp, text) });
      continue;
    }

    const exactAll = byExact.get(text.toLowerCase());
    if (exactAll && exactAll.length) {
      // Check if layers already match one of the candidates
      var appliedComp = null;
      for (var ci = 0; ci < exactAll.length; ci++) {
        var cand = exactAll[ci];
        var allMatch = true;
        for (var li = 0; li < layerNames.length; li++) {
          if (layerNames[li] !== cand.id) { allMatch = false; break; }
        }
        if (allMatch) { appliedComp = cand; break; }
      }
      var selectedComp   = appliedComp || exactAll[0];
      var alreadyApplied = appliedComp !== null;
      // If the layer text doesn't equal the comp base text, the match came via a
      // plural-form row (e.g. "Images" matched _other of "Image"). Treat as synced.
      var formMatch = selectedComp.text && text.toLowerCase() !== selectedComp.text.toLowerCase()
        ? { id: '_plural', name: 'plural form', text: text, isPluralForm: true } : null;
      matched.push({ text, nodeIds, layerNames, comp: selectedComp, candidates: exactAll, alreadyApplied, matchedVariant: formMatch });
      continue;
    }

    // Translated text — the layer holds a non-base variant (e.g. German) of a component
    var vExact = byVariantExact.get(text.toLowerCase());
    var vHit = (vExact && vExact.length) ? vExact[0] : byVariantNorm.get(n);
    if (vHit) {
      var vApplied = layerNames.every(function(ln) { return ln === vHit.comp.id; });
      matched.push({ text, nodeIds, layerNames, comp: vHit.comp, candidates: [vHit.comp], alreadyApplied: vApplied, matchedVariant: vHit.variant });
      continue;
    }

    // Text content IS a Ditto developer ID (e.g. "nav.menu.title") — try ID lookup
    if (/^[a-z][a-z0-9]*(?:\.[a-z0-9][a-z0-9\-]*)+$/.test(text)) {
      var textComp = byDeveloperId.get(text) || byId.get(norm(text));
      if (textComp) {
        matched.push({ text, nodeIds, layerNames, comp: textComp, candidates: [textComp], alreadyApplied: false, textIsId: true });
        continue;
      }
      newItems.push({ text, nodeIds, layerNames, id: text, fromAnnotation: true });
      continue;
    }
    const close = byNorm.get(n) || byId.get(n);
    if (close)  { near.push({ text, nodeIds, layerNames, comp: close, decision: null }); continue; }
    newItems.push({ text, nodeIds, layerNames, id: suggestId(text) });
  }
  return { matched, near, newItems };
}

// ── Plural editor (matched components) ──────────────────────────────────────
var _plp = null;
function plpCols() { return [{ key: 'base', label: 'Base (source)', variantId: null, isBase: true }]
  .concat((_variants || []).map(function(v) { return { key: v.id, label: v.name || v.id, variantId: v.id, isBase: false }; })); }
function plpKey(form, colKey) { return form + '|' + colKey; }

async function openPluralPanel(compId) {
  document.getElementById('plOvId').textContent = compId;
  document.getElementById('plOvBody').innerHTML = '<div class="state"><div class="spinner"></div><p>Loading…</p></div>';
  document.getElementById('plOvSave').disabled = true;
  document.getElementById('plOverlay').classList.add('open');
  try {
    var filter = encodeURIComponent(JSON.stringify({ variants: [{ id: 'all' }] }));
    var res = await fetch(API + '/components?filter=' + filter, { headers: { Authorization: getDittoKey() } });
    var rows = (await res.json()).filter(function(c) { return baseIdOf(c) === compId; });
    var cells = {}, seed = {}, formSet = new Set(), aliasBase = '';
    rows.forEach(function(c) {
      var colKey = c.variantId || 'base';
      if (c.pluralForm) { formSet.add(c.pluralForm); cells[plpKey(c.pluralForm, colKey)] = c.text || ''; }
      else { seed[colKey] = c.text || ''; if (colKey === 'base') aliasBase = c.text || ''; }
    });
    var forms = plpOrder(Array.from(formSet));
    var master = forms.filter(function(f) { return aliasBase && (cells[plpKey(f, 'base')] || '') === aliasBase; })[0];
    if (master) forms = [master].concat(forms.filter(function(f) { return f !== master; }));

function closePluralPanel() { document.getElementById('plOverlay').classList.remove('open'); _plp = null; }
function renderPluralPanel() {

    ? '<select id="plpAddSel">' + avail.map(function(f) { return '<option value="' + f + '">' + f + '</option>'; }).join('') + '</select><button class="btn btn-ghost btn-sm" onclick="plpAddForm(document.getElementById(\'plpAddSel\').value)">+ Add form</button>'
    : '<span style="font-size:11px;color:var(--txt3)">All six plural forms are defined.</span>') + '</div>';
  if (!_plp.forms.length) {

    document.getElementById('plOvSave').disabled = !_plp.dirty; return;
  }
  var cards = _plp.forms.map(function(f, fi) {
    var rws = cols.map(function(c) {

        '<textarea class="plf-ta" placeholder="' + esc(c.label) + '" oninput="plpInput(\'' + esc(f) + '\',\'' + esc(c.key) + '\',this)">' + esc(val) + '</textarea></div>';
    }).join('');
    var mv = '<span class="plf-move"><button title="Move up" ' + (fi === 0 ? 'disabled' : '') + ' onclick="plpMove(\'' + esc(f) + '\',-1)">▲</button>' +
      '<button title="Move down" ' + (fi === _plp.forms.length - 1 ? 'disabled' : '') + ' onclick="plpMove(\'' + esc(f) + '\',1)">▼</button></span>';
    return '<div class="plf-card"><div class="plf-hd">' + mv + '<span class="plf-name">' + esc(f) + '</span>' +
      (fi === 0 ? '<span class="plf-master">master</span>' : '') + '<span class="plf-sp"></span>' +
      '<button class="plf-x" title="Remove form" onclick="plpRemove(\'' + esc(f) + '\')">✕</button></div>' + rws + '</div>';
  }).join('');
  body.innerHTML = cards + addRow;

}
function plpInput(form, colKey, ta) { _plp.cells[plpKey(form, colKey)] = ta.value; _plp.dirty = true; document.getElementById('plOvSave').disabled = false; syncWs(ta); }
